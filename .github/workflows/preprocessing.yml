name: Automate Data Preprocessing

on:
  push:
    paths:
      - 'preprocessing/automate_*.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Menggunakan Python versi 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn # Menginstal library yang dibutuhkan

    - name: Run preprocessing script
      run: |
        cd Preprocessing
        python automate_Arif.py # JANGAN LUPA: sesuaikan nama file ini!

    - name: Commit and push changes
      run: |
        # Robot akan menyimpan (commit) file data baru yang dihasilkan kembali ke GitHub
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Automated preprocessing: update data" || echo "No changes to commit"
        git push